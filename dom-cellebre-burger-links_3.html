<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dom Cellebre Burger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0b;
    --gold:#f9b800;
    --gold-dark:#c98a00;
    --cream:#fdf6e8;
    --ink:#111;
    --shadow:#7a5200;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    font-family:'Nunito',sans-serif;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:44px 18px 40px;
  }
  .page{width:100%;max-width:440px;text-align:center;}

  /* ---- logo ---- */
  .logo{
    position:relative;
    width:180px;height:180px;
    margin:0 auto 18px;
  }
  .logo img{
    width:100%;height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
  }

  h1{
    font-family:'Archivo Black',sans-serif;
    font-size:2.35rem;
    line-height:1;
    margin:0 0 12px;
    color:var(--cream);
    letter-spacing:-0.5px;
  }
  .tagline{
    font-size:1.05rem;
    font-weight:700;
    color:#e6dfd2;
    margin:0 0 34px;
  }

  /* ---- burger stack ---- */
  .stack{display:flex;flex-direction:column;align-items:center;gap:9px;}

  .bun{
    width:88%;
    height:74px;
    background:linear-gradient(180deg,#f0c274,#dda049);
    border:3px solid var(--ink);
    box-shadow:7px 8px 0 var(--shadow);
  }
  .bun.top{
    border-radius:110px 110px 16px 16px;
    position:relative;
  }
  .bun.top::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle, #fdf6e8 46%, transparent 47%),
      radial-gradient(circle, #fdf6e8 46%, transparent 47%),
      radial-gradient(circle, #fdf6e8 46%, transparent 47%),
      radial-gradient(circle, #fdf6e8 46%, transparent 47%),
      radial-gradient(circle, #fdf6e8 46%, transparent 47%);
    background-size:12px 12px;
    background-repeat:no-repeat;
    background-position: 24% 46%, 44% 30%, 58% 58%, 72% 34%, 86% 52%;
  }
  .bun.bottom{
    height:56px;
    border-radius:16px 16px 60px 60px;
    background:linear-gradient(180deg,#dda049,#c78d3c);
  }

  .layer{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:11px;
    width:94%;
    padding:19px 20px;
    border:3px solid var(--ink);
    border-radius:60px;
    text-decoration:none;
    font-family:'Archivo Black',sans-serif;
    font-size:1.06rem;
    letter-spacing:-0.2px;
    box-shadow:7px 8px 0 var(--shadow);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .layer:hover,.layer:focus-visible{
    transform:translate(3px,4px);
    box-shadow:3px 4px 0 var(--shadow);
  }
  .layer:focus-visible{outline:3px solid #fff;outline-offset:3px;}

  .layer.patty{
    background:linear-gradient(180deg,#8a4a22,#5f2f13);
    color:var(--cream);
    font-size:1.3rem;
    padding:24px 20px;
    position:relative;
  }
  .layer.cheese{background:var(--cream);color:var(--ink);}

  .badge{
    position:absolute;
    top:-15px; right:20px;
    background:var(--ink);
    color:var(--gold);
    font-family:'Archivo Black',sans-serif;
    font-size:0.72rem;
    padding:6px 13px;
    border-radius:999px;
    border:2px solid var(--gold);
    white-space:nowrap;
    letter-spacing:0.3px;
  }

  .layer img{width:26px;height:26px;object-fit:contain;flex:0 0 auto;}
  .layer svg{flex:0 0 auto;}
  .layer .mini{width:30px;height:30px;border-radius:50%;object-fit:cover;}

  /* ---- footer ---- */
  .addresses{margin-top:34px;font-size:0.86rem;color:#8f887c;line-height:1.7;}
  .addresses strong{color:var(--gold);display:block;font-size:0.8rem;letter-spacing:0.6px;text-transform:uppercase;margin-top:12px;}

  @media (max-width:380px){
    h1{font-size:1.95rem;}
    .layer{font-size:0.95rem;}
    .layer.patty{font-size:1.12rem;}
  }
  @media (prefers-reduced-motion: reduce){
    .layer{transition:none;}
  }
</style>
</head>
